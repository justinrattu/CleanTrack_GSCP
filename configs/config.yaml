route_optimizer:
  default_objective: balanced
  emissions_weight: 0.6
  cost_weight: 0.4

waste_predictor:
  n_estimators: 300
  max_depth: 6
  test_size: 0.2
  random_state: 42

circularity_scorer:
  weights:
    recyclability: 0.40
    reuse_potential: 0.30
    lifespan: 0.20
    bio_based: 0.10

data:
  raw_path: data/raw/
  processed_path: data/processed/

logging:
  level: INFO
